name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Scan for committed secrets
        shell: bash
        run: |
          set -euo pipefail
          patterns=(
            'eyJ[A-Za-z0-9_-]{10,}\.[A-Za-z0-9_-]{10,}'   # JWT-shaped token
            'xox[baprs]-[A-Za-z0-9-]{10,}'                 # Slack bot/user token
            'https://hooks\.slack\.com/services/T[A-Za-z0-9/]+' # Slack webhook URL
            'SUPABASE_SERVICE_ROLE_KEY\s*=\s*[^ ]{10,}'    # service role key assigned to a real value
            '-----BEGIN [A-Z ]*PRIVATE KEY-----'           # private key
          )
          found=0
          for pattern in "${patterns[@]}"; do
            if git grep -InP "$pattern" -- . ':!*.md' ':!package-lock.json' ':!.github/workflows/ci.yml' 2>/dev/null; then
              echo "::error::Possible secret matching pattern: $pattern"
              found=1
            fi
          done
          if [ "$found" -eq 1 ]; then
            echo "Secret scan failed — see matches above."
            exit 1
          fi
          echo "No secret patterns found."

      - name: Confirm no real .env is tracked
        run: |
          if git ls-files | grep -E '^\.env$|^\.env\.[^.]*$' | grep -v '\.env\.example$'; then
            echo "::error::A real .env file is tracked in git."
            exit 1
          fi
          echo "No tracked .env files besides .env.example."
